name: Fetch RSS articles

on:
  schedule:
    - cron: '0 6 * * 1'  # Lundi 8h00 heure de Paris (6h UTC)
  workflow_dispatch:      # Déclenchement manuel possible

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch RSS feeds
        run: node scripts/fetch-rss.mjs

      - name: Commit articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/articles.json
          git diff --staged --quiet || git commit -m "chore: mise à jour automatique des articles RSS (lundi)"

      - name: Push
        run: git push

      - name: Build
        run: npm run build
        env:
          VITE_GITHUB_DATA_TOKEN: ${{ secrets.VITE_GITHUB_DATA_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
