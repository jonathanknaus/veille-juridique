name: Fetch RSS articles

on:
  schedule:
    - cron: '0 6 * * 1'  # Lundi 8h00 heure de Paris (6h UTC)
  workflow_dispatch:      # Déclenchement manuel possible

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch RSS feeds
        run: node scripts/fetch-rss.mjs

      - name: Commit articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/articles.json
          git diff --staged --quiet || git commit -m "chore: mise à jour automatique des articles RSS (lundi)"

      - name: Push
        run: git push
